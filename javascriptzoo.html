<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY ZOO </title>
    <style>
        body{
            background-color: rgb(205, 248, 162); font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif; text-align: center; padding: 30px;
        }
        h1{
            color: black;
        }
        #zoo{
            border: 2px solid darkgreen; width: 300px; margin: 16px auto; padding: 12px; border-radius: 10px; background-color: darkblue;
        }
        .zone{
            border: 1px solid cornflowerblue; margin: 6px 0; padding: 8px 12px ; border-radius: 6px; text-align: left;
        }
        button{
            background-color: brown; color: aquamarine; padding: 10px 24px; border-radius: 20px; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>My Zoo</h1>
    <p>use java script and DOM to add animals to each zone </p>
    <div id="zoo">
        <div class="zone">
            zone 1:
            <span id="zone1"></span>
        </div>
        <div class="zone">
            zone 2:
            <span id="zone2"></span>
        </div>
        <div class="zone">
            zone 3:
            <span id="zone3"></span>
        </div>
        <div class="zone">
            total animal:
            <span id="total"></span>
        </div>
    </div>
    <br>
    <button onclick="openzoo()">open the zoo </button>
    <p id="zoo-status"></p>
    <button onclick="closezoo()">close the zoo </button>
    <p id="status1"></p>
    <script>
        function openzoo(){
            document.getElementById("zone1").innerHTML="Lion";
            document.getElementById("zone2").innerHTML="Tiger"
            document.getElementById("zone3").innerHTML="deer"
            document.getElementById("total").innerHTML="3";
            document.getElementById("zoo").style.backgroundColor="lightyellow";
            document.getElementById("zoo-status").innerHTML=document.title+"is now open ";
        }

         function closezoo() {
                document.getElementById("zone1").innerHTML = "";
                document.getElementById("zone2").innerHTML = ""
                document.getElementById("zone3").innerHTML = ""
                document.getElementById("total").innerHTML = "";
                document.getElementById("zoo").style.backgroundColor = "pink";
                document.getElementById("zoo-status").innerHTML = document.title + "is now close ";
            }
           
    </script>
    
</body>
</html>
